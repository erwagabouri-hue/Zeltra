<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>ZeltraMarket</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
background:#0e0e0e;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.menu button{
padding:12px;
margin:6px;
font-size:16px;
border:none;
border-radius:8px;
background:#2ecc71;
color:white;
}

.section{
margin-top:25px;
}

</style>

</head>

<body>

<h1>🚀 ZELTRAMARKET</h1>

<div class="menu">

<button onclick="show('categories')">📊 Pronostics</button>

<button onclick="show('balance')">💰 Mon solde</button>

</div>


<div id="categories" class="section" style="display:none;">

<h2>Catégories</h2>

<button>⚽ Sport</button>
<button>🎬 Divertissement</button>
<button>🌐 Web</button>
<button>🏛 Politique</button>
<button>🎮 Gaming</button>

</div>


<div id="balance" class="section" style="display:none;">

<h2>💰 Solde ZELTRA</h2>

<p>Votre solde : 0 ZELTRA</p>

</div>


<script>

function show(section){

document.getElementById("categories").style.display="none";
document.getElementById("balance").style.display="none";

document.getElementById(section).style.display="block";

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ZeltraMarket</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

h1{
margin-top:20px;
}

.categories button{

background:#1c1c1c;
color:white;
border:none;
padding:12px;
margin:6px;
border-radius:8px;

}

.bet button{

padding:12px 20px;
border:none;
border-radius:8px;
margin:10px;
font-size:16px;

}

.yes{
background:#1db954;
color:white;
}

.no{
background:#ff4d4d;
color:white;
}

.balance{
margin-top:30px;
font-size:20px;
}

</style>

</head>

<body>

<h1>🚀 ZELTRAMARKET</h1>

<h3 id="user"></h3>

<h2>Catégories</h2>

<div class="categories">

<button>⚽ Sport</button>
<button>🎬 Divertissement</button>
<button>🌐 Web</button>
<button>🏛 Politique</button>
<button>🎮 Gaming</button>

</div>

<h2>Pronostic</h2>

<p>Bitcoin dépassera-t-il 100k avant 2027 ?</p>

<div class="bet">

<button class="yes">OUI</button>

<button class="no">NON</button>

</div>

<div class="balance">

💰 Solde ZELTRA : <span id="balance">0</span>

</div>

<script>

const tg = window.Telegram.WebApp;

tg.expand();

const user = tg.initDataUnsafe.user;

if(user){

document.getElementById("user").innerHTML =
"👤 "+user.first_name+" (@"+user.username+")";

console.log("Utilisateur Telegram :", user);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZELTRAMARKET</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f0f0f;
color:white;
}

header{
display:flex;
align-items:center;
padding:15px;
background:#111;
border-bottom:1px solid #222;
}

.menu{
font-size:24px;
cursor:pointer;
margin-right:15px;
}

.title{
font-weight:bold;
}

.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#111;
padding:20px;
transition:0.3s;
z-index:1000;
}

.sidebar a{
display:block;
padding:12px;
margin:10px 0;
background:#1a1a1a;
border-radius:8px;
text-decoration:none;
color:white;
cursor:pointer;
}

.sidebar.open{
left:0;
}

.container{
padding:20px;
}

.category{
background:#1f1f1f;
padding:14px;
border-radius:10px;
margin:10px 0;
text-align:center;
cursor:pointer;
}

.user{
margin-top:10px;
font-size:14px;
color:#aaa;
}

</style>

</head>

<body>

<div class="sidebar" id="sidebar">

<a onclick="showPage('home')">🏠 Accueil</a>
<a onclick="showPage('pronostics')">📊 Pronostics</a>
<a onclick="showPage('buy')">💰 Acheter du ZELTRA</a>
<a onclick="showPage('idea')">💡 Proposer un pari</a>
<a onclick="showPage('contact')">✉️ Contact</a>

</div>

<header>

<div class="menu" onclick="toggleMenu()">☰</div>

<div class="title">ZELTRAMARKET</div>

</header>

<div class="container" id="content">

<h2>Bienvenue</h2>

<p>ZeltraMarket est la première plateforme française de pronostics sur des faits réels.</p>

<div id="userInfo" class="user"></div>

</div>

<script>

const tg = window.Telegram.WebApp;

tg.expand();

const user = tg.initDataUnsafe.user;

if(user){

document.getElementById("userInfo").innerHTML =
"Connecté en tant que : " + user.first_name;

}

function toggleMenu(){

const sidebar = document.getElementById("sidebar");

sidebar.classList.toggle("open");

}

function showPage(page){

const content = document.getElementById("content");

toggleMenu();

if(page === "home"){

content.innerHTML = `
<h2>Bienvenue</h2>
<p>Plateforme de pronostics Zeltra.</p>
`;

}

if(page === "pronostics"){

content.innerHTML = `
<h2>Catégories</h2>

<div class="category">⚽ Sport</div>
<div class="category">🏛 Politique</div>
<div class="category">🌐 Web</div>
<div class="category">₿ Crypto</div>
<div class="category">📰 Actualités</div>
<div class="category">🎮 Gaming</div>
`;

}

if(page === "buy"){

content.innerHTML = `
<h2>Acheter du ZELTRA</h2>
<p>Bientôt disponible.</p>
`;

}

if(page === "idea"){

content.innerHTML = `
<h2>Proposer un pari</h2>
<p>Envoyez vos idées à l'équipe Zeltra.</p>
`;

}

if(page === "contact"){

content.innerHTML = `
<h2>Contact</h2>
<p>Telegram : @zeltramarket</p>
`;

}

}

</script>

</body>
</html>

name: Deploy infra to VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.8.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Sync infra to VPS
        run: |
          rsync -avz --delete infra/ ${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_SSH_HOST }}:/tmp/infra/
        env:
          RSYNC_RSH: "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

      - name: Run bootstrap on VPS
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            ${{ secrets.VPS_SSH_USER }}@${{ secrets.VPS_SSH_HOST }} \
            "sudo bash /tmp/infra/scripts/bootstrap.sh ${{ secrets.DOMAIN_NAME }} ${{ secrets.ONION_HOST }} ${{ secrets.CERTBOT_EMAIL }}"

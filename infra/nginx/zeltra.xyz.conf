server {
    listen 80;
    server_name zeltra.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zeltra.xyz;

    ssl_certificate /etc/letsencrypt/live/zeltra.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zeltra.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;
    limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;

    location / {
        limit_req zone=one burst=20 nodelay;
        proxy_pass http://127.0.0.1:9052;
        proxy_set_header Host crbaywolnvbbhzq7wzeapkhvbk2yigdldwwvi6jsg2eopcvm7gg4tdid.onion;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 180s;
        proxy_buffering off;
        proxy_http_version 1.1;
    }
}
